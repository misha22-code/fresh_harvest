name: fresh_harvest
description: "A Fresh Harvest App - Vegetables & Fruits Delivery"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # State Management
  provider: ^6.1.2

  # URL Launcher
  url_launcher: ^6.3.0

  # Charts
  fl_chart: ^0.68.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0

  # Voice Search
  speech_to_text: ^7.0.0

  # Image Picker
  image_picker: ^1.0.7

  # OTP Input
  pinput: ^2.2.31

  # Network Connectivity
  connectivity_plus: ^5.0.0

  # Utilities
  intl: ^0.19.0

  # ❌ REMOVE supabase_flutter
  # supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/